name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project if uploaded as zip
        run: |
          ZIPFILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -n "$ZIPFILE" ]; then
            echo "Found $ZIPFILE, unzipping..."
            mkdir -p _extracted
            unzip -o "$ZIPFILE" -d _extracted
            rm "$ZIPFILE"
            SRC=$(dirname "$(find _extracted -maxdepth 4 -name 'build.gradle' | head -n 1)")
            echo "Project root detected at: $SRC"
            cp -r "$SRC"/. .
            rm -rf _extracted
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SampLauncher-debug-apk
          path: app/build/outputs/apk/debug/*.apk
